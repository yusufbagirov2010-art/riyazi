<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NotDefteri — Cədvəl & Qeydlər</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@200;400;500;600;700;900&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        :root {
            --bg: #0f1117;
            --bg2: #161821;
            --bg3: #1c1f2b;
            --card: #1e2130;
            --card2: #252839;
            --border: #2a2d3e;
            --border2: #363a50;
            --fg: #e4e6f0;
            --fg2: #c0c3d4;
            --muted: #6b7094;
            --accent: #e8a030;
            --accent2: #d4891a;
            --accentBg: rgba(232,160,48,0.1);
            --accentBorder: rgba(232,160,48,0.25);
            --green: #3dd68c;
            --greenBg: rgba(61,214,140,0.1);
            --red: #f06060;
            --redBg: rgba(240,96,96,0.1);
            --blue: #5ea8f0;
            --blueBg: rgba(94,168,240,0.1);
            --purple: #a78bfa;
            --purpleBg: rgba(167,139,250,0.1);
            --pink: #f472b6;
            --pinkBg: rgba(244,114,182,0.1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Outfit', sans-serif;
            background: var(--bg);
            color: var(--fg);
            overflow: hidden;
            height: 100vh;
        }

        h1, h2, h3, h4 { font-family: 'Outfit', sans-serif; }
        .mono { font-family: 'JetBrains Mono', monospace; }

        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--muted); }

        /* Sol sidebar */
        .sidebar {
            width: 280px;
            min-width: 280px;
            background: var(--bg2);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            height: 100vh;
            transition: transform 0.3s ease;
        }

        .notebook-item {
            padding: 12px 16px;
            cursor: pointer;
            transition: all 0.2s;
            border-left: 3px solid transparent;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .notebook-item:hover { background: rgba(255,255,255,0.03); }
        .notebook-item.active {
            background: var(--accentBg);
            border-left-color: var(--accent);
        }
        .notebook-item.active .nb-title { color: var(--accent); }

        .nb-color {
            width: 10px; height: 10px;
            border-radius: 50%;
            flex-shrink: 0;
        }

        /* Əsas məzmun */
        .main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* Toolbar */
        .toolbar {
            padding: 12px 24px;
            background: var(--bg2);
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            gap: 8px;
            flex-wrap: wrap;
        }
        .tool-btn {
            padding: 7px 14px;
            border-radius: 8px;
            border: 1px solid var(--border);
            background: var(--card);
            color: var(--fg2);
            cursor: pointer;
            font-family: 'Outfit';
            font-size: 0.82rem;
            font-weight: 500;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 6px;
            white-space: nowrap;
        }
        .tool-btn:hover { border-color: var(--accent); color: var(--accent); background: var(--accentBg); }
        .tool-btn.danger:hover { border-color: var(--red); color: var(--red); background: var(--redBg); }
        .tool-btn.primary {
            background: var(--accent);
            border-color: var(--accent);
            color: #000;
            font-weight: 700;
        }
        .tool-btn.primary:hover { background: var(--accent2); }

        .tool-sep {
            width: 1px;
            height: 24px;
            background: var(--border);
            margin: 0 4px;
        }

        /* Cədvəl */
        .table-wrapper {
            flex: 1;
            overflow: auto;
            padding: 24px;
        }

        .notebook-table {
            border-collapse: separate;
            border-spacing: 0;
            width: 100%;
            min-width: 600px;
        }

        .notebook-table th {
            background: var(--card2);
            padding: 0;
            border: 1px solid var(--border);
            position: sticky;
            top: 0;
            z-index: 10;
            font-weight: 700;
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: var(--muted);
        }
        .notebook-table th:first-child { border-top-left-radius: 10px; }
        .notebook-table th:last-child { border-top-right-radius: 10px; }

        .th-content {
            padding: 10px 14px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 6px;
            cursor: pointer;
            min-width: 120px;
        }
        .th-content:hover .th-actions { opacity: 1; }
        .th-actions {
            display: flex; gap: 4px; opacity: 0; transition: opacity 0.2s;
        }
        .th-action-btn {
            width: 22px; height: 22px;
            border-radius: 4px;
            border: none;
            background: rgba(255,255,255,0.06);
            color: var(--muted);
            cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            font-size: 0.65rem;
            transition: all 0.2s;
        }
        .th-action-btn:hover { background: var(--redBg); color: var(--red); }

        .notebook-table td {
            border: 1px solid var(--border);
            padding: 0;
            background: var(--card);
            transition: background 0.15s;
            position: relative;
        }
        .notebook-table tr:hover td { background: rgba(255,255,255,0.015); }

        .cell-input {
            width: 100%;
            padding: 10px 14px;
            background: transparent;
            border: none;
            color: var(--fg);
            font-family: 'Outfit';
            font-size: 0.9rem;
            outline: none;
            min-height: 42px;
        }
        .cell-input:focus {
            background: rgba(232,160,48,0.04);
            box-shadow: inset 0 0 0 2px var(--accentBorder);
        }
        .cell-input::placeholder { color: var(--border2); }

        /* Sətir nömrəsi */
        .row-num {
            width: 48px;
            min-width: 48px;
            text-align: center;
            color: var(--muted);
            font-size: 0.75rem;
            font-family: 'JetBrains Mono', monospace;
            background: var(--bg3) !important;
            cursor: pointer;
            user-select: none;
        }
        .row-num:hover { color: var(--red); }

        .notebook-table th.row-num-header {
            width: 48px;
            min-width: 48px;
            background: var(--bg3) !important;
        }

        /* Checkbox hüceyrə */
        .check-cell {
            width: 44px; min-width: 44px; text-align: center;
        }
        .cell-check {
            width: 18px; height: 18px;
            border-radius: 5px;
            border: 2px solid var(--border2);
            background: transparent;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
            color: transparent;
            font-size: 0.65rem;
        }
        .cell-check.checked {
            background: var(--green);
            border-color: var(--green);
            color: #000;
        }
        .cell-check:hover { border-color: var(--green); }

        /* Status badge */
        .status-badge {
            display: inline-block;
            padding: 2px 10px;
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: 600;
        }

        /* Modal */
        .modal-overlay {
            position: fixed; inset: 0;
            background: rgba(0,0,0,0.6);
            backdrop-filter: blur(6px);
            z-index: 1000;
            display: none;
            align-items: center;
            justify-content: center;
        }
        .modal-overlay.active { display: flex; }
        .modal-box {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 28px;
            width: 95%;
            max-width: 440px;
            animation: modalIn 0.3s ease;
        }
        @keyframes modalIn {
            from { opacity: 0; transform: translateY(20px) scale(0.97); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }

        .modal-input {
            width: 100%;
            padding: 10px 14px;
            background: var(--bg);
            border: 1px solid var(--border);
            color: var(--fg);
            border-radius: 8px;
            font-family: 'Outfit';
            font-size: 0.95rem;
            outline: none;
            transition: border-color 0.2s;
        }
        .modal-input:focus { border-color: var(--accent); }

        /* Rəng seçici */
        .color-picker {
            display: flex; gap: 8px; flex-wrap: wrap;
        }
        .color-dot {
            width: 28px; height: 28px;
            border-radius: 50%;
            cursor: pointer;
            border: 2px solid transparent;
            transition: all 0.2s;
        }
        .color-dot:hover { transform: scale(1.15); }
        .color-dot.active { border-color: var(--fg); box-shadow: 0 0 0 2px var(--bg), 0 0 0 4px currentColor; }

        /* Toast */
        .toast-box {
            position: fixed; bottom: 24px; right: 24px;
            z-index: 2000;
            display: flex; flex-direction: column; gap: 8px;
        }
        .toast {
            padding: 12px 18px;
            border-radius: 10px;
            font-weight: 600;
            font-size: 0.85rem;
            display: flex; align-items: center; gap: 8px;
            animation: toastIn 0.3s ease, toastOut 0.3s ease 2.7s forwards;
            box-shadow: 0 8px 24px rgba(0,0,0,0.4);
        }
        .toast-success { background: var(--green); color: #000; }
        .toast-error { background: var(--red); color: #fff; }
        .toast-info { background: var(--accent); color: #000; }
        @keyframes toastIn { from { opacity: 0; transform: translateX(60px); } to { opacity: 1; transform: translateX(0); } }
        @keyframes toastOut { to { opacity: 0; transform: translateY(10px); } }

        /* Status dropdown */
        .status-dropdown {
            position: absolute;
            top: 100%;
            left: 0;
            background: var(--card2);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 6px;
            z-index: 50;
            display: none;
            min-width: 140px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.4);
        }
        .status-dropdown.active { display: block; }
        .status-option {
            padding: 6px 10px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 0.82rem;
            display: flex; align-items: center; gap: 8px;
            transition: background 0.15s;
        }
        .status-option:hover { background: rgba(255,255,255,0.05); }

        /* Context menu */
        .ctx-menu {
            position: fixed;
            background: var(--card2);
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 6px;
            z-index: 900;
            display: none;
            min-width: 180px;
            box-shadow: 0 8px 30px rgba(0,0,0,0.5);
        }
        .ctx-menu.active { display: block; }
        .ctx-item {
            padding: 8px 12px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.85rem;
            display: flex; align-items: center; gap: 10px;
            color: var(--fg2);
            transition: all 0.15s;
        }
        .ctx-item:hover { background: var(--accentBg); color: var(--accent); }
        .ctx-item.danger:hover { background: var(--redBg); color: var(--red); }
        .ctx-sep { height: 1px; background: var(--border); margin: 4px 8px; }

        /* Axtarış */
        .search-box {
            position: relative;
        }
        .search-box input {
            width: 100%;
            padding: 8px 12px 8px 34px;
            background: var(--bg);
            border: 1px solid var(--border);
            color: var(--fg);
            border-radius: 8px;
            font-family: 'Outfit';
            font-size: 0.85rem;
            outline: none;
            transition: border-color 0.2s;
        }
        .search-box input:focus { border-color: var(--accent); }
        .search-box i {
            position: absolute;
            left: 11px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--muted);
            font-size: 0.8rem;
        }

        /* Empty state */
        .empty-state {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100%;
            color: var(--muted);
            gap: 12px;
        }
        .empty-state i { font-size: 3.5rem; opacity: 0.3; }

        /* Boş səhifə fon */
        .bg-pattern {
            position: absolute; inset: 0;
            background-image:
                radial-gradient(circle at 20% 80%, rgba(232,160,48,0.04) 0%, transparent 50%),
                radial-gradient(circle at 80% 20%, rgba(61,214,140,0.03) 0%, transparent 50%);
            pointer-events: none;
        }

        /* Stat bar */
        .stat-bar {
            display: flex; gap: 16px; padding: 10px 24px;
            background: var(--bg2);
            border-top: 1px solid var(--border);
            font-size: 0.78rem;
            color: var(--muted);
        }
        .stat-bar span { display: flex; align-items: center; gap: 4px; }

        /* Tag */
        .tag {
            display: inline-flex; align-items: center; gap: 4px;
            padding: 2px 8px; border-radius: 4px;
            font-size: 0.72rem; font-weight: 600;
        }

        /* Responsive */
        @media (max-width: 768px) {
            .sidebar { position: fixed; left: 0; top: 0; z-index: 100; transform: translateX(-100%); }
            .sidebar.open { transform: translateX(0); }
            .mobile-toggle { display: flex !important; }
        }

        @media (prefers-reduced-motion: reduce) {
            *, *::before, *::after {
                animation-duration: 0.01ms !important;
                transition-duration: 0.01ms !important;
            }
        }
    </style>
</head>
<body>

<div style="display: flex; height: 100vh; position: relative;">
    <div class="bg-pattern"></div>

    <!-- SOL SIDEBAR -->
    <aside class="sidebar" id="sidebar">
        <!-- Logo -->
        <div style="padding: 20px 16px 12px; border-bottom: 1px solid var(--border);">
            <div style="display: flex; align-items: center; gap: 10px; margin-bottom: 14px;">
                <div style="width: 36px; height: 36px; background: linear-gradient(135deg, var(--accent), var(--accent2)); border-radius: 9px; display: flex; align-items: center; justify-content: center;">
                    <i class="fas fa-book-open" style="color: #000; font-size: 0.9rem;"></i>
                </div>
                <div>
                    <div style="font-weight: 900; font-size: 1.05rem; letter-spacing: -0.3px;">NotDefteri</div>
                    <div style="font-size: 0.65rem; color: var(--muted);">Cədvəl & Qeydlər</div>
                </div>
            </div>
            <div class="search-box">
                <i class="fas fa-search"></i>
                <input type="text" placeholder="Dəftər axtar..." id="nbSearch" oninput="filterNotebooks()">
            </div>
        </div>

        <!-- Dəftər siyahısı -->
        <div style="flex: 1; overflow-y: auto; padding: 8px 0;" id="notebookList"></div>

        <!-- Yeni dəftər düyməsi -->
        <div style="padding: 12px; border-top: 1px solid var(--border);">
            <button class="tool-btn primary" style="width: 100%; justify-content: center;" onclick="openNewNBModal()">
                <i class="fas fa-plus"></i> Yeni Dəftər
            </button>
        </div>
    </aside>

    <!-- ƏSAS MƏZMUN -->
    <div class="main-content" style="position: relative;">
        <!-- Mobile toggle -->
        <button class="tool-btn mobile-toggle" id="mobileToggle" style="display: none; position: absolute; top: 12px; left: 12px; z-index: 50;" onclick="document.getElementById('sidebar').classList.toggle('open')">
            <i class="fas fa-bars"></i>
        </button>

        <!-- Toolbar -->
        <div class="toolbar" id="toolbar" style="display: none;">
            <span style="font-weight: 700; font-size: 1.05rem; margin-right: 8px;" id="currentNBName"></span>
            <div class="tool-sep"></div>

            <button class="tool-btn" onclick="addRow()" title="Sətir əlavə et">
                <i class="fas fa-plus"></i> Sətir
            </button>
            <button class="tool-btn" onclick="addColumn()" title="Sütun əlavə et">
                <i class="fas fa-columns"></i> Sütun
            </button>
            <div class="tool-sep"></div>

            <button class="tool-btn" onclick="addColumnWithType('check')" title="Checkbox sütunu">
                <i class="far fa-check-square"></i> Checkbox
            </button>
            <button class="tool-btn" onclick="addColumnWithType('status')" title="Status sütunu">
                <i class="fas fa-flag"></i> Status
            </button>
            <button class="tool-btn" onclick="addColumnWithType('tag')" title="Etiket sütunu">
                <i class="fas fa-tag"></i> Etiket
            </button>
            <div class="tool-sep"></div>

            <button class="tool-btn" onclick="renameNB()" title="Adını dəyiş">
                <i class="fas fa-pen"></i>
            </button>
            <button class="tool-btn" onclick="duplicateNB()" title="Kopyala">
                <i class="fas fa-copy"></i>
            </button>
            <button class="tool-btn danger" onclick="clearTable()" title="Cədvəli təmizlə">
                <i class="fas fa-eraser"></i>
            </button>
            <button class="tool-btn danger" onclick="deleteNB()" title="Dəftəri sil">
                <i class="fas fa-trash"></i>
            </button>

            <div style="flex: 1;"></div>

            <button class="tool-btn" onclick="exportCSV()" title="CSV kimi yüklə">
                <i class="fas fa-download"></i> CSV
            </button>
        </div>

        <!-- Cədvəl bölməsi -->
        <div class="table-wrapper" id="tableWrapper">
            <div class="empty-state" id="emptyState">
                <i class="fas fa-book-open"></i>
                <div style="font-size: 1.1rem; font-weight: 600;">Dəftər seçin və ya yaradın</div>
                <div style="font-size: 0.85rem; max-width: 300px; text-align: center; line-height: 1.5;">
                    Sol paneldən mövcud dəftəri seçə və ya "Yeni Dəftər" düyməsi ilə öz cədvəlinizi yaradın
                </div>
            </div>
            <div id="tableContainer" style="display: none;"></div>
        </div>

        <!-- Status bar -->
        <div class="stat-bar" id="statBar" style="display: none;">
            <span><i class="fas fa-table"></i> <span id="statRows">0</span> sətir</span>
            <span><i class="fas fa-columns"></i> <span id="statCols">0</span> sütun</span>
            <span><i class="fas fa-check-circle"></i> <span id="statChecked">0</span> tamamlanıb</span>
            <div style="flex: 1;"></div>
            <span class="mono" style="font-size: 0.72rem;" id="statSaved"></span>
        </div>
    </div>
</div>

<!-- Yeni Dəftər Modal -->
<div class="modal-overlay" id="newNBModal">
    <div class="modal-box">
        <h3 style="font-weight: 700; font-size: 1.15rem; margin-bottom: 20px;">Yeni Dəftər Yarat</h3>
        <div style="margin-bottom: 16px;">
            <label style="font-size: 0.78rem; color: var(--muted); margin-bottom: 6px; display: block;">Dəftərin adı</label>
            <input type="text" class="modal-input" id="newNBName" placeholder="Məs: Gündəlik tapşırıqlar" maxlength="40" onkeydown="if(event.key==='Enter')createNB()">
        </div>
        <div style="margin-bottom: 20px;">
            <label style="font-size: 0.78rem; color: var(--muted); margin-bottom: 8px; display: block;">Rəng</label>
            <div class="color-picker" id="colorPicker"></div>
        </div>
        <div style="margin-bottom: 20px;">
            <label style="font-size: 0.78rem; color: var(--muted); margin-bottom: 6px; display: block;">Sütun sayı (başlanğıc)</label>
            <input type="number" class="modal-input" id="newNBCols" value="4" min="1" max="20" style="width: 80px;">
        </div>
        <div style="display: flex; gap: 10px; justify-content: flex-end;">
            <button class="tool-btn" onclick="closeModal('newNBModal')">Ləğv et</button>
            <button class="tool-btn primary" onclick="createNB()">Yarat</button>
        </div>
    </div>
</div>

<!-- Ad Dəyişdirmə Modal -->
<div class="modal-overlay" id="renameModal">
    <div class="modal-box">
        <h3 style="font-weight: 700; font-size: 1.15rem; margin-bottom: 20px;">Dəftəri Adlandır</h3>
        <div style="margin-bottom: 20px;">
            <input type="text" class="modal-input" id="renameInput" maxlength="40" onkeydown="if(event.key==='Enter')confirmRename()">
        </div>
        <div style="display: flex; gap: 10px; justify-content: flex-end;">
            <button class="tool-btn" onclick="closeModal('renameModal')">Ləğv et</button>
            <button class="tool-btn primary" onclick="confirmRename()">Yadda Saxla</button>
        </div>
    </div>
</div>

<!-- Context Menu -->
<div class="ctx-menu" id="ctxMenu">
    <div class="ctx-item" onclick="ctxAction('insertAbove')"><i class="fas fa-arrow-up" style="width:16px;"></i> Yuxarı əlavə et</div>
    <div class="ctx-item" onclick="ctxAction('insertBelow')"><i class="fas fa-arrow-down" style="width:16px;"></i> Aşağı əlavə et</div>
    <div class="ctx-sep"></div>
    <div class="ctx-item" onclick="ctxAction('duplicateRow')"><i class="fas fa-copy" style="width:16px;"></i> Sətiri kopyala</div>
    <div class="ctx-sep"></div>
    <div class="ctx-item danger" onclick="ctxAction('deleteRow')"><i class="fas fa-trash" style="width:16px;"></i> Sətiri sil</div>
</div>

<!-- Status Dropdown -->
<div class="status-dropdown" id="statusDropdown"></div>

<!-- Toast -->
<div class="toast-box" id="toastBox"></div>

<script>
// ==================== RƏNGLƏR ====================
const COLORS = [
    { name: 'Amber', value: '#e8a030' },
    { name: 'Yaşıl', value: '#3dd68c' },
    { name: 'Mavi', value: '#5ea8f0' },
    { name: 'Qırmızı', value: '#f06060' },
    { name: 'Bənövşəyi', value: '#a78bfa' },
    { name: 'Çəhrayı', value: '#f472b6' },
    { name: 'Turkuaz', value: '#2dd4bf' },
    { name: 'Narıncı', value: '#fb923c' },
];

const STATUSES = [
    { label: 'Gözləyir', color: 'var(--accent)', bg: 'var(--accentBg)' },
    { label: 'İrəliləyir', color: 'var(--blue)', bg: 'var(--blueBg)' },

// ==================== İNİSİALİZASİYA ====================
document.addEventListener('DOMContentLoaded', () => {
    loadFromStorage();
    if (notebooks.length === 0) {
        // Nümunə dəftərlər yarat
        notebooks = getSampleData();
        saveToStorage();
    }
    renderNotebookList();
    initColorPicker();

    // Kliklə context menu və status dropdown bağla
    document.addEventListener('click', (e) => {
        if (!e.target.closest('.ctx-menu')) {
            document.getElementById('ctxMenu').classList.remove('active');
        }
        if (!e.target.closest('.status-dropdown') && !e.target.closest('.status-badge')) {
            document.getElementById('statusDropdown').classList.remove('active');
            activeStatusCell = null;
        }
    });

    // Mobile toggle göstər
    if (window.innerWidth <= 768) {
        document.getElementById('mobileToggle').style.display = 'flex';
    }
    window.addEventListener('resize', () => {
        document.getElementById('mobileToggle').style.display = window.innerWidth <= 768 ? 'flex' : 'none';
    });
});
